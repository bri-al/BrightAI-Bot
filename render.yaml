services:
  - type: web
    name: trading-bot-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DEBUG
        value: "true"
      - key: BROKER
        value: simulation
      - key: STRATEGY
        value: adaptive
      - key: INITIAL_CAPITAL
        value: "10000"
      - key: MIN_CONFIDENCE
        value: "20"
      - key: SCAN_INTERVAL
        value: "60"
    healthCheckPath: /health

  - type: web
    name: trading-bot-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://trading-bot-backend.onrender.com
