services:
  - type: web
    name: trading-bot-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    workingDir: backend
    envVars:
      - key: DEBUG
        value: "true"
      - key: BROKER
        value: simulation
      - key: STRATEGY
        value: adaptive
      - key: INITIAL_CAPITAL
        value: "10000"
      - key: MIN_CONFIDENCE
        value: "20"
      - key: SCAN_INTERVAL
        value: "60"

  - type: web
    name: trading-bot-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://trading-bot-backend.onrender.com
